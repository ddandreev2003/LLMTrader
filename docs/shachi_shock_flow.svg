    <rect x="1210" y="202" width="104" height="28" rx="14" fill="#dc2626"/>
    <text x="1262" y="221" text-anchor="middle" class="badge">AGENT 1</text>
    <text x="1310" y="257" text-anchor="middle" class="box-title">8@652>9 @53C;OB>@</text>
    <text x="1310" y="287" text-anchor="middle" class="box-text">halt / circuit_breaker</text>
    <text x="1310" y="309" text-anchor="middle" class="box-text">short_ban</text>
  </g>

  <g filter="url(#shadow)">
