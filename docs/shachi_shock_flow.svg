    <rect x="1210" y="327" width="104" height="28" rx="14" fill="#c026d3"/>
    <text x="1262" y="346" text-anchor="middle" class="badge">AGENT 2</text>
    <text x="1310" y="382" text-anchor="middle" class="box-title">5480 / =>2>AB8</text>
    <text x="1310" y="416" text-anchor="middle" class="box-text">news_spike</text>
  </g>

  <!-- Agent outputs -->
  <path d="M 1435 150 C 1480 150, 1480 235, 1520 245" class="thin-arrow"/>
  <path d="M 1435 275 L 1520 275" class="thin-arrow"/>
  <path d="M 1435 400 C 1480 400, 1480 315, 1520 305" class="thin-arrow"/>

  <g filter="url(#shadow)">
    <rect x="1520" y="205" width="0" height="0" fill="none"/>
  </g>

  <!-- Second row: JSON, aggregation, event, application -->
  <g filter="url(#shadow)">
    <rect x="80" y="555" width="245" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="202.5" y="592" text-anchor="middle" class="box-title">JSON-3>;>A0</text>
    <text x="202.5" y="623" text-anchor="middle" class="box-text">shock_occurred</text>
    <text x="202.5" y="647" text-anchor="middle" class="box-text">type, severity</text>
    <text x="202.5" y="671" text-anchor="middle" class="box-text">duration, impact</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="540" width="285" height="165" rx="22" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="532.5" y="578" text-anchor="middle" class="box-title">aggregate_shock_votes</text>
    <text x="532.5" y="610" text-anchor="middle" class="box-text">1. >B1@0AK205B no shock</text>
    <text x="532.5" y="633" text-anchor="middle" class="box-text">2. ?@>25@O5B allowed_shocks</text>
    <text x="532.5" y="656" text-anchor="middle" class="box-text">3. 454C?;8F8@C5B B8?K</text>
    <text x="532.5" y="679" text-anchor="middle" class="box-text">4. A>@B8@C5B ?> ?@8>@8B5BC</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="735" y="555" width="245" height="135" rx="22" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
    <text x="857.5" y="592" text-anchor="middle" class="box-title">B>3>2K9 H>:</text>
    <text x="857.5" y="622" text-anchor="middle" class="box-text">5A;8 halt / circuit_breaker,</text>
    <text x="857.5" y="646" text-anchor="middle" class="box-text">>=8 ?>402;ONB</text>
    <text x="857.5" y="670" text-anchor="middle" class="box-text">1>;55 A;01K5 H>:8</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="555" width="235" height="135" rx="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="1157.5" y="592" text-anchor="middle" class="box-title">SHOCK_TRIGGERED</text>
    <text x="1157.5" y="623" text-anchor="middle" class="box-text">A>1KB85 2 EventBus</text>
    <text x="1157.5" y="647" text-anchor="middle" class="small">payload: type, impact,</text>
    <text x="1157.5" y="670" text-anchor="middle" class="small">duration, volatility</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1335" y="540" width="210" height="165" rx="22" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="1440" y="578" text-anchor="middle" class="box-title">@8<5=5=85</text>
    <text x="1440" y="610" text-anchor="middle" class="box-text">F5=K *= impact</text>
    <text x="1440" y="634" text-anchor="middle" class="box-text">volatility *= multiplier</text>
    <text x="1440" y="658" text-anchor="middle" class="box-text">halt blocks trading</text>
    <text x="1440" y="682" text-anchor="middle" class="box-text">=0 duration_ticks</text>
  </g>

  <!-- Connect agent cluster to JSON -->
  <path d="M 1520 275 C 1565 275, 1565 500, 325 500 C 250 500, 220 525, 205 545" class="arrow"/>
  <path d="M 325 622 L 380 622" class="arrow"/>
  <path d="M 675 622 L 725 622" class="arrow"/>
  <path d="M 980 622 L 1030 622" class="arrow"/>
  <path d="M 1275 622 L 1325 622" class="arrow"/>

  <!-- Priority legend -->
  <g>
    <rect x="80" y="755" width="1465" height="82" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="112" y="788" class="box-title">@8>@8B5BK H>:>2:</text>
    <text x="315" y="788" class="priority">halt 100</text>
    <text x="445" y="788" class="priority">circuit_breaker 90</text>
    <text x="650" y="788" class="priority">short_ban 70</text>
    <text x="810" y="788" class="priority">position_limit 60</text>
    <text x="1000" y="788" class="priority">rate_hike 50</text>
    <text x="1148" y="788" class="priority">news_spike 40</text>
    <text x="112" y="820" class="small">'5< 2KH5 G8A;>, B5< A8;L=55 ?@8>@8B5B. halt 8 circuit_breaker ?5@5:@K20NB >AB0;L=K5 >4=>2@5<5==K5 H>:8.</text>
  </g>
</svg>
