<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLMSimTrade — Web Console</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="viz_common.js?v=2"></script>
  <script src="sim_controls.js?v=1"></script>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2332; --text: #e7ecf3; --muted: #8b9cb3;
      --accent: #3b82f6; --shock: #f59e0b; --halt: #ef4444; --ok: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
    header { margin-bottom: 16px; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      background: var(--card); border: 1px solid #2d3a4f; border-radius: 12px; padding: 12px 16px;
    }
    button {
      padding: 8px 16px; border-radius: 8px; border: 1px solid #2d3a4f;
      background: #121a26; color: var(--text); cursor: pointer; font-size: 0.875rem;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-left: auto; font-size: 0.875rem; }
    .badge { padding: 4px 10px; border-radius: 999px; background: #121a26; border: 1px solid #2d3a4f; }
    .badge.running { border-color: var(--ok); color: var(--ok); }
    .badge.paused { border-color: var(--shock); color: var(--shock); }
    .badge.waiting_llm { border-color: #a855f7; color: #a855f7; }
    .speed { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); }
    .tabs { display: flex; gap: 4px; margin: 16px 0 12px; }
    .tab {
      padding: 8px 16px; border-radius: 8px 8px 0 0; background: var(--card);
      border: 1px solid #2d3a4f; border-bottom: none; cursor: pointer; font-size: 0.875rem;
    }
    .tab.active { background: #121a26; border-color: var(--accent); color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--card); border-radius: 12px; border: 1px solid #2d3a4f; padding: 16px; }
    .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }
    .chart-wrap { position: relative; height: 280px; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; }
    #agent-panels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
    @media (max-width: 900px) { #agent-panels { grid-template-columns: 1fr; } }
    .agent-panel { background: #121a26; border-radius: 10px; border: 1px solid #2d3a4f; padding: 12px; font-size: 0.8rem; position: relative; overflow: hidden; }
    .agent-panel-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .agent-panel-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 8px; padding-left: 6px; }
    .agent-panel-title { font-weight: 600; color: var(--text); font-size: 0.9rem; }
    .agent-panel-strategy { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; }
    .agent-panel-stats { display: flex; flex-wrap: wrap; gap: 10px; padding-left: 6px; margin-bottom: 6px; }
    .agent-panel-holdings { padding-left: 6px; color: var(--muted); margin-bottom: 8px; }
    .agent-panel-chart-wrap { height: 72px; margin: 8px 0 8px 6px; }
    .agent-panel-trades-title { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; padding-left: 6px; }
    .agent-panel-trades { list-style: none; padding: 4px 6px; margin: 0; font-family: ui-monospace, monospace; font-size: 0.72rem; }
    .agent-panel-trades li { padding: 2px 0; border-bottom: 1px solid #1e293b; }
    .agent-card { background: #121a26; border-radius: 8px; padding: 10px; border: 1px solid #2d3a4f; font-size: 0.8rem; }
    .agent-card .id { font-weight: 600; color: var(--accent); }
    .agent-card .pnl-pos { color: var(--ok); }
    .agent-card .pnl-neg { color: var(--halt); }
    #event-log { max-height: 320px; overflow-y: auto; font-size: 0.8rem; font-family: ui-monospace, monospace; }
    .event { padding: 6px 0; border-bottom: 1px solid #2d3a4f; }
    .event.shock { color: var(--shock); font-weight: 600; }
    .event.trade { color: #93c5fd; }
    .shock-item { padding: 8px; margin-bottom: 6px; border-radius: 8px; background: #121a26; border-left: 4px solid var(--shock); font-size: 0.8rem; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #2d3a4f; background: #121a26; color: var(--text); }
    .msg { margin-top: 12px; font-size: 0.85rem; color: var(--muted); }
    .msg.error { color: var(--halt); }
    .msg.ok { color: var(--ok); }
    .spinner { display: none; color: #a855f7; font-size: 0.85rem; }
    .spinner.visible { display: inline; }
    .ticker-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .ticker-tab, .filter-chip {
      padding: 4px 12px; border-radius: 999px; border: 1px solid #2d3a4f;
      background: #121a26; color: var(--text); cursor: pointer; font-size: 0.75rem;
    }
    .ticker-tab.active, .filter-chip.active { border-color: var(--accent); color: var(--accent); }
    #candleChart { width: 100%; height: 100%; }
    .event-filters { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .event-row {
      display: grid; grid-template-columns: 64px 56px 40px 80px 48px 1fr;
      gap: 6px; padding: 4px 0; border-bottom: 1px solid #2d3a4f; font-size: 0.72rem;
    }
    .event-row .ev-kind { color: var(--muted); text-transform: uppercase; }
    .event-row.shock .ev-msg { color: var(--shock); font-weight: 600; }
    .event-row.trade .ev-msg { color: #93c5fd; }
    .event-row.reject .ev-msg { color: var(--halt); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>LLMSimTrade — Web Console</h1>
    <div class="controls">
      <button id="btn-start" class="primary">Start</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-step">Step (+1)</button>
      <button id="btn-play">Play</button>
      <button id="btn-stop">Stop</button>
      <button id="btn-reset">Reset</button>
      <div class="speed">
        <label for="speed">Скорость</label>
        <input type="range" id="speed" min="100" max="5000" step="100" value="500" style="width:120px" />
        <span id="speed-val">500ms</span>
      </div>
      <div class="status-bar">
        <span id="status-badge" class="badge">idle</span>
        <span id="tick-info" class="badge">tick 0 / —</span>
        <span id="date-info" class="badge">—</span>
        <span id="llm-spinner" class="spinner">⏳ ожидание LLM…</span>
      </div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="sim">Симуляция</div>
    <div class="tab" data-tab="settings">Настройки</div>
  </div>

  <div id="panel-sim" class="panel active">
    <div class="grid">
      <div>
        <div class="card">
          <h2>Свечи 5m (T / SBER)</h2>
          <div id="ticker-tabs" class="ticker-tabs"></div>
          <div class="chart-wrap"><div id="candleChart"></div></div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2>Equity по агентам</h2>
          <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
          <div id="agent-panels"></div>
        </div>
      </div>
      <div>
        <div class="card">
          <h2>Регуляторные шоки</h2>
          <div id="shock-list"></div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2>Лента событий</h2>
          <div id="event-filters" class="event-filters"></div>
          <div id="event-log"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="panel-settings" class="panel">
    <div class="card">
      <h2>Параметры симуляции</h2>
      <div class="form-grid">
        <div>
          <label>Начальный капитал (₽)</label>
          <input type="number" id="cfg-cash" value="1000000" step="100000" />
        </div>
        <div>
          <label>Число тиков</label>
          <input type="number" id="cfg-ticks" placeholder="auto" />
        </div>
        <div>
          <label>SHOCK_INTERVAL</label>
          <input type="number" id="cfg-shock-interval" value="30" />
        </div>
        <div>
          <label>Режим рынка</label>
          <select id="cfg-market-mode">
            <option value="moex">MOEX</option>
            <option value="orderlog_intraday">OrderLog intraday (T/SBER)</option>
            <option value="synthetic">Synthetic</option>
          </select>
        </div>
        <div>
          <label>Shock backend</label>
          <select id="cfg-shock-backend">
            <option value="legacy">legacy (mock)</option>
            <option value="shachi">shachi (LLM)</option>
          </select>
        </div>
        <div>
          <label>Конфиг стратегий</label>
          <select id="cfg-strategies">
            <option value="config/strategies_ru.yaml">strategies_ru.yaml</option>
            <option value="config/strategies_intraday_tls.yaml">strategies_intraday_tls.yaml</option>
            <option value="config/strategies_portfolio_manual.yaml">strategies_portfolio_manual.yaml</option>
          </select>
        </div>
        <div>
          <label>Auto-play interval (ms)</label>
          <input type="number" id="cfg-auto-interval" value="500" />
        </div>
      </div>
      <div style="margin-top:16px">
        <button id="btn-apply-config" class="primary">Применить</button>
        <p class="msg" id="config-msg">Изменения доступны только до старта или после Reset (tick 0).</p>
        <div class="preset-row">
          <span class="muted">Presets:</span>
          <button type="button" id="preset-normal">Normal TLS</button>
          <button type="button" id="preset-hft">HFT 5m</button>
          <button type="button" id="preset-nft">NFT 4 agents</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const AGENT_COLORS = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#14b8a6'];
    let equityChart, ws, pollTimer, wsFailed = false, lastState = null;
    const VC = window.VizCommon;
    const HEADER_IDS = { statusBadge: 'status-badge', tickInfo: 'tick-info', dateInfo: 'date-info' };

    function startPolling() {
      if (pollTimer) return;
      wsFailed = true;
      pollTimer = setInterval(async () => {
        try {
          const r = await api('/api/state');
          if (r.ok) updateUI(await r.json());
        } catch (e) {}
      }, 500);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      wsFailed = false;
    }

    function api(path, opts = {}) {
      return fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    }

    function initCharts() {
      VC.initCandleTabs('ticker-tabs', ['T', 'SBER'], (t) => {
        VC.setActiveTicker(t);
        if (lastState) VC.updateCandleChart(t, lastState.bar_history, lastState.shocks);
      });
      VC.initCandleChart('candleChart');
      VC.initEventFilters('event-filters');
      const opts = {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b9cb3' } } },
        scales: {
          x: { ticks: { color: '#8b9cb3', maxTicksLimit: 12 }, grid: { color: '#2d3a4f' } },
          y: { ticks: { color: '#8b9cb3' }, grid: { color: '#2d3a4f' }, position: 'left' },
          y1: { display: false },
        },
      };
      equityChart = new Chart(document.getElementById('equityChart'), {
        type: 'line', data: { labels: [], datasets: [] }, options: opts,
      });
    }

    function updateUI(state) {
      lastState = state;
      const status = state.status || 'idle';
      const badge = document.getElementById('status-badge');
      badge.textContent = status;
      badge.className = 'badge ' + status + (state.halted ? ' halted' : '');

      const tick = state.tick ?? state.current_tick ?? 0;
      const total = state.total_ticks || '—';
      document.getElementById('tick-info').textContent = `tick ${tick} / ${total}`;
      const dt = state.datetime || state.date || '—';
      const interval = state.bar_interval ? ` · ${state.bar_interval}` : '';
      const dayN = state.sim_trading_days || 0;
      const dayM = state.sim_total_days || 0;
      const dayPart = dayM ? ` · день ${dayN}/${dayM}` : '';
      document.getElementById('date-info').textContent = dt + interval + dayPart;
      document.getElementById('llm-spinner').classList.toggle('visible', status === 'waiting_llm');

      const barHist = state.bar_history || { tickers: ['T','SBER'], candles: {}, timestamps: [] };
      VC.updateCandleChart(VC.getActiveTicker(), barHist, state.shocks);

      const hist = state.price_history || { ticks: [], benchmark: [] };
      const allIds = Object.keys(state.agent_equity || state.agents_meta || state.agents || {});
      const tradingIds = allIds.filter((id) => !VC.isMarketMaker(state, id));
      const mmIds = allIds.filter((id) => VC.isMarketMaker(state, id));
      equityChart.data.labels = hist.ticks;
      equityChart.data.datasets = [
        ...tradingIds.map((id, i) => ({
          label: VC.agentLabel(state, id),
          data: (state.agent_equity[id] || []).map((p) => ({ x: p.tick, y: p.value })),
          borderColor: AGENT_COLORS[i % AGENT_COLORS.length],
          tension: 0.2,
          pointRadius: 0,
          yAxisID: "y",
        })),
        ...mmIds.map((id) => ({
          label: VC.agentLabel(state, id) + " (PnL)",
          data: (state.agent_equity[id] || []).map((p) => ({
            x: p.tick,
            y: p.pnl ?? p.value ?? 0,
          })),
          borderColor: "#14b8a6",
          borderDash: [4, 3],
          tension: 0.2,
          pointRadius: 0,
          yAxisID: "y1",
        })),
      ];
      equityChart.options.scales.x = {
        type: "linear",
        ticks: { color: "#8b9cb3", maxTicksLimit: 12 },
        grid: { color: "#2d3a4f" },
      };
      equityChart.options.scales.y1 = {
        position: "right",
        display: mmIds.length > 0,
        ticks: { color: "#14b8a6" },
        grid: { drawOnChartArea: false },
      };
      equityChart.update('none');

      VC.renderAgentPanels('agent-panels', state, Chart);

      VC.renderShockList('shock-list', state.shocks);
      VC.renderEventLog('event-log', state.recent_events, true);
      VC.flashLatestShock(state.shocks);

      const editable = ['idle', 'paused'].includes(status) && tick === 0;
      document.getElementById('btn-apply-config').disabled = !editable;
    }

    function connectWs() {
      if (wsFailed) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen = () => stopPolling();
      ws.onmessage = (ev) => { try { updateUI(JSON.parse(ev.data)); } catch (e) {} };
      ws.onerror = () => { ws.close(); startPolling(); };
      ws.onclose = (ev) => {
        if (wsFailed) return;
        if (ev.code === 1006 || ev.code === 1001) {
          startPolling();
          return;
        }
        setTimeout(connectWs, 2000);
      };
    }

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel-' + t.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('speed').addEventListener('input', (e) => {
      document.getElementById('speed-val').textContent = e.target.value + 'ms';
    });

    document.getElementById('preset-normal').onclick = async () => {
      await SimControls.applyPreset('config/strategies_intraday_tls.yaml');
      loadConfig();
    };
    document.getElementById('preset-hft').onclick = async () => {
      await SimControls.applyPreset('config/strategies_intraday_hft.yaml');
      loadConfig();
    };
    document.getElementById('preset-nft').onclick = async () => {
      await SimControls.applyPreset('config/strategies_intraday_nft.yaml');
      loadConfig();
    };
    document.getElementById('preset-dev').onclick = async () => {
      await api('/api/config', {
        method: 'PUT',
        body: JSON.stringify({
          market_mode: 'orderlog_intraday',
          portfolio_config: 'config/portfolio_intraday_hft.yaml',
          strategies_config: 'config/strategies_intraday_hft.yaml',
          shock_backend: 'legacy',
        }),
      });
      loadConfig();
    };

    document.getElementById('btn-apply-config').onclick = async () => {
      const msg = document.getElementById('config-msg');
      const body = {
        initial_cash_rub: parseFloat(document.getElementById('cfg-cash').value),
        shock_interval: parseInt(document.getElementById('cfg-shock-interval').value, 10),
        market_mode: document.getElementById('cfg-market-mode').value,
        shock_backend: document.getElementById('cfg-shock-backend').value,
        strategies_config: document.getElementById('cfg-strategies').value,
        auto_play_interval_ms: parseInt(document.getElementById('cfg-auto-interval').value, 10),
      };
      const ticks = document.getElementById('cfg-ticks').value;
      if (ticks) body.sim_n_ticks = parseInt(ticks, 10);
      const res = await api('/api/config', { method: 'PUT', body: JSON.stringify(body) });
      if (res.ok) {
        msg.className = 'msg ok';
        msg.textContent = 'Конфиг применён. Нажмите Start.';
      } else {
        const err = await res.json().catch(() => ({}));
        msg.className = 'msg error';
        msg.textContent = err.detail || 'Ошибка применения конфига';
      }
    };

    async function loadConfig() {
      const res = await api('/api/config');
      if (!res.ok) return;
      const cfg = await res.json();
      document.getElementById('cfg-cash').value = cfg.initial_cash_rub || 1000000;
      document.getElementById('cfg-shock-interval').value = cfg.shock_interval || 30;
      document.getElementById('cfg-market-mode').value = cfg.market_mode || 'moex';
      document.getElementById('cfg-shock-backend').value = cfg.shock_backend || 'legacy';
      document.getElementById('cfg-strategies').value = cfg.strategies_config || 'config/strategies_ru.yaml';
      document.getElementById('cfg-auto-interval').value = cfg.auto_play_interval_ms || 500;
      if (cfg.sim_n_ticks) document.getElementById('cfg-ticks').value = cfg.sim_n_ticks;
    }

    initCharts();
    SimControls.initWebControls(updateUI);
    loadConfig();
  </script>
</body>
</html>
